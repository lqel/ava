<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text x=%2250%25 y=%2255%25 font-size=%2260%25 font-family=%22HarmonyOS Sans Regular%22 text-anchor=%22middle%22 dominant-baseline=%22middle%22 fill=%22black%22>/A</text></svg>">
    <title>Home / Anthvia</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'HarmonyOS Sans Regular', 'HarmonyOS Sans', sans-serif;
            font-weight: 400;
        }

        html, body {
            width: 100%;
            height: 100vh;
            overflow: hidden;
            background: #ffffff;
            position: relative;
        }

        .center-text {
            font-size: 8vw;
            color: #000000;
            letter-spacing: 0.06em;
            display: inline-flex;
            align-items: baseline;
            justify-content: center;
            line-height: 1;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            transition: all 1.2s cubic-bezier(0.76, 0, 0.24, 1);
            z-index: 999;
        }

        .center-text.moved {
            top: 2rem;
            left: 2rem;
            transform: translate(0, 0);
            font-size: 1.8rem;
        }

        .slash {
            display: inline-block;
            clip-path: inset(12% 0 12% 0);
            animation: slashSlant 7s ease-in-out infinite;
            will-change: transform, opacity;
            transform: translateZ(0);
            backface-visibility: hidden;
        }

        @keyframes slashSlant {
            0%   { opacity: 1; transform: translate(0, 0) translateZ(0); }
            14%  { opacity: 1; transform: translate(0, 0) translateZ(0); }
            18%  { opacity: 0; transform: translate(15vw, -36vw) translateZ(0); }
            24%  { opacity: 0; transform: translate(-15vw, 36vw) translateZ(0); }
            28.5%{ opacity: 1; transform: translate(0, 0) translateZ(0); }
            100% { opacity: 1; transform: translate(0, 0) translateZ(0); }
        }

        .footer-text {
            position: absolute;
            color: #000000;
            bottom: 25%;
            text-align: left;
        }

        .left-bottom {
            left: 2rem;
            font-size: 1.2rem;
            opacity: 0;
            line-height: 1.5;
            pointer-events: none;
        }

        .right-bottom {
            right: 2rem;
            padding-top: 0.2em;
            font-size: 0.9rem;
            opacity: 1;
            transition: opacity 1s ease;
        }
        .right-bottom.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .photo-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }

        /* 🔥 终极融合蒙版：完全看不到任何边缘、线条、轮廓 */
        .photo {
            position: absolute;
            object-fit: cover;
            opacity: 0;
            transition: opacity 2s ease;
            
            -webkit-mask-image: radial-gradient(200% 200% at center, black 12%, transparent 65%);
            mask-image: radial-gradient(200% 200% at center, black 12%, transparent 65%);
            
            transform-origin: center;
            animation: idleDrift 28s ease-in-out infinite alternate;
        }

        .photo.show {
            opacity: 0.9;
        }

        /* 不动时优雅微动 */
        @keyframes idleDrift {
            0%   { transform: translate(-50%, -50%) rotate(0deg) translate(0px, 0px); }
            100% { transform: translate(-50%, -50%) rotate(0deg) translate(22px, 18px); }
        }
    </style>
</head>
<body>
    <div class="center-text">
        ANTHV<span class="slash">/</span>A
    </div>

    <div class="footer-text left-bottom">
        一点星尘（深圳）科技有限公司<br>
        Anthvia Limited
    </div>
    
    <div class="footer-text right-bottom" id="email"></div>
    <div class="photo-wrapper" id="photoWrapper"></div>

    <script>
        document.getElementById("email").innerText = "contact" + "@" + "anthvia.com";

        // 全部 a-n 14张图
        const images = [];
        for (let i = 0; i < 14; i++) {
            images.push(`images/${String.fromCharCode(97 + i)}.jpg`);
        }

        setTimeout(() => {
            document.querySelector('.center-text').classList.add('moved');
            document.querySelector('.right-bottom').classList.add('hidden');
            setTimeout(initPhotos, 1000);
        }, 5000);

        // 14张全量 + 平均铺满 + 自适应
        function initPhotos() {
            const wrapper = document.getElementById('photoWrapper');
            const total = images.length;

            const cols = Math.ceil(Math.sqrt(total * 1.2));
            const rows = Math.ceil(total / cols);
            const cellW = 100 / cols;
            const cellH = 100 / rows;

            const imgSize = Math.max(window.innerWidth, window.innerHeight) / (Math.sqrt(total) * 0.65);

            images.forEach((src, index) => {
                const img = document.createElement('img');
                img.src = src;
                img.className = 'photo';
                img.style.width = imgSize + 'px';
                img.style.height = imgSize + 'px';

                const col = index % cols;
                const row = Math.floor(index / cols);
                const baseX = col * cellW + cellW * 0.5;
                const baseY = row * cellH + cellH * 0.5;

                const posX = baseX + (Math.random() - 0.5) * cellW * 0.4;
                const posY = baseY + (Math.random() - 0.5) * cellH * 0.4;
                const rot = (Math.random() * 12) - 6;

                img.style.left = posX + '%';
                img.style.top = posY + '%';
                img.style.animationDelay = `${index * 0.2}s`;
                img.style.transform = `translate(-50%, -50%) rotate(${rot}deg)`;

                wrapper.appendChild(img);
            });

            setTimeout(() => {
                document.querySelectorAll('.photo').forEach(p => p.classList.add('show'));
            }, 100);

            initSmoothParallax();
        }

        // 丝滑物理叠加微动
        function initSmoothParallax() {
            const photos = document.querySelectorAll('.photo');
            let mouseX = 0, mouseY = 0;
            let mx = 0, my = 0;

            window.addEventListener('mousemove', (e) => {
                mouseX = (e.clientX / window.innerWidth - 0.5);
                mouseY = (e.clientY / window.innerHeight - 0.5);
            });

            window.addEventListener('touchmove', (e) => {
                if (e.touches.length > 0) {
                    mouseX = (e.touches[0].clientX / window.innerWidth - 0.5);
                    mouseY = (e.touches[0].clientY / window.innerHeight - 0.5);
                }
            });

            function animate() {
                mx += (mouseX - mx) * 0.1;
                my += (mouseY - my) * 0.1;

                photos.forEach((img, i) => {
                    const speed = 5 + i * 0.9;
                    const moveX = mx * speed;
                    const moveY = my * speed;
                    const rot = parseFloat(img.style.transform.match(/rotate\((.*?)deg\)/)[1] || 0);
                    img.style.transform = `translate(-50%, -50%) rotate(${rot}deg) translate(${moveX}px, ${moveY}px)`;
                });
                requestAnimationFrame(animate);
            }
            animate();
        }
    </script>
</body>
</html>
