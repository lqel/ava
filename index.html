<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Home / Anthvia</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'HarmonyOS Sans Regular', 'HarmonyOS Sans', sans-serif;
            font-weight: 400;
        }

        html, body {
            width: 100%;
            height: 100vh;
            overflow: hidden;
            background: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 中间主文字：保持 8vw 不变 */
        .center-text {
            font-size: 8vw;
            color: #000;
            letter-spacing: 0.15em;
        }

        .footer-text {
            position: absolute;
            color: #000;
            bottom: 25%;
            /* 文字居中对齐，两行更美观 */
            text-align: left;
        }

        /* 恢复原始字号：1.2rem | 透明隐藏可复制 | 两行文字 */
        .left-bottom {
            left: 2rem;
            font-size: 1.2rem;
            opacity: 0;
            /* 行间距优化，适配两行文字 */
            line-height: 1.5;
        }

        /* 恢复原始字号：0.9rem */
        .right-bottom {
            right: 2rem;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="center-text">ANTHV/A</div>
    <!-- 左下：两行文字 + 隐藏可复制 + 原始字号 -->
    <div class="footer-text left-bottom">
        一点星尘（深圳）科技有限公司<br>
        Anthvia Limited
    </div>
    <!-- 右下：原始字号 + 原文 -->
    <div class="footer-text right-bottom">ai#anthvia.com(#=@)</div>
</body>
</html>
