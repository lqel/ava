<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LUO / LUO</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100vh;
            overflow: hidden;
            background: #ffffff;
            position: relative;
        }

        .center-text {
            font-size: 8vw;
            letter-spacing: 0.1em;
            display: inline-flex;
            align-items: baseline;
            justify-content: center;
            line-height: 1;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            transition: all 1.2s cubic-bezier(0.76, 0, 0.24, 1);
            z-index: 999;
            font-family: 'Arial Rounded MT Bold', 'Helvetica Rounded', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            font-weight: 900;
            
            background: linear-gradient(45deg, #ff9a9e, #fad0c4, #fad0c4, #ffecd2, #c9f4ff, #a1c4fd);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: bgShift 8s ease infinite;
        }

        @keyframes bgShift {
            0%{background-position: 0% 50%}
            50%{background-position: 100% 50%}
            100%{background-position: 0% 50%}
        }

        .center-text.moved {
            top: 2rem;
            left: 2rem;
            transform: translate(0, 0);
            font-size: 1.8rem;
        }

        .slash {
            display: inline-block;
            font-family: 'Helvetica', 'Arial', sans-serif !important;
            animation: slashSlant 7s ease-in-out infinite;
            background: linear-gradient(45deg, #ff9a9e, #fad0c4, #fad0c4, #ffecd2, #a1c4fd);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            padding-bottom: 0.1em;
            line-height: 1.2 !important;
        }

        @keyframes slashSlant {
            0%   { opacity: 1; transform: translate(0, 0); }
            14%  { opacity: 1; transform: translate(0, 0); }
            18%  { opacity: 0; transform: translate(15px, -36px); }
            24%  { opacity: 0; transform: translate(-15px, 36px); }
            28.5%{ opacity: 1; transform: translate(0, 0); }
            100% { opacity: 1; transform: translate(0, 0); }
        }

        /* 底部导航文字样式 */
        .nav-link {
            position: absolute;
            bottom: 2rem;
            font-size: 1rem;
            font-family: 'Arial Rounded MT Bold', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            font-weight: 600;
            opacity: 0;
            transition: opacity 1.2s ease;
            cursor: pointer;
            text-decoration: none;
            background: linear-gradient(45deg, #ff85a2, #74b6ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            z-index: 888;
        }
        .nav-link.show {
            opacity: 1;
        }
        .nav-left {
            left: 2rem;
        }
        .nav-right {
            right: 2rem;
        }

        .photo-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }

        /* 🔥 图片改成完美圆形 */
        .photo {
            position: absolute;
            object-fit: cover;
            opacity: 0;
            border-radius: 50%; /* 圆形核心代码 */
            transition: opacity 2s ease;
            -webkit-mask-image: radial-gradient(240% 240% at center, black 12%, transparent 75%);
            mask-image: radial-gradient(240% 240% at center, black 12%, transparent 75%);
            transform-origin: center;
        }

        .photo.show {
            opacity: 0.92;
        }
    </style>
</head>
<body>
    <div class="center-text">
        LUO<span class="slash">/</span>LUO
    </div>

    <!-- 底部导航链接 -->
    <a href="https://im.qq.com/" target="_blank" class="nav-link nav-left">积分查询</a>
    <a href="https://www.baidu.com/" target="_blank" class="nav-link nav-right">礼物登记</a>

    <div class="photo-wrapper" id="photoWrapper"></div>

    <script>
        const images = [];
        for (let i = 0; i < 14; i++) {
            images.push(`images/${String.fromCharCode(97 + i)}.jpg`);
        }

        setTimeout(() => {
            document.querySelector('.center-text').classList.add('moved');
            setTimeout(initPhotos, 1000);
        }, 5000);

        function initPhotos() {
            const wrapper = document.getElementById('photoWrapper');
            const total = images.length;
            const cols = Math.ceil(Math.sqrt(total * 1.2));
            const rows = Math.ceil(total / cols);
            const cellW = 100 / cols;
            const cellH = 100 / rows;
            const imgSize = Math.max(window.innerWidth, window.innerHeight) / (Math.sqrt(total) * 0.65);

            images.forEach((src, index) => {
                const img = document.createElement('img');
                img.src = src;
                img.className = 'photo';
                img.style.width = imgSize + 'px';
                img.style.height = imgSize + 'px';

                const col = index % cols;
                const row = Math.floor(index / cols);
                const baseX = col * cellW + cellW * 0.5;
                const baseY = row * cellH + cellH * 0.5;

                const posX = baseX + (Math.random() - 0.5) * cellW * 0.4;
                const posY = baseY + (Math.random() - 0.5) * cellH * 0.4;
                const rot = (Math.random() * 30) - 15;

                img.style.left = posX + '%';
                img.style.top = posY + '%';
                img.style.transform = `translate(-50%, -50%) rotate(${rot}deg)`;
                wrapper.appendChild(img);
            });

            setTimeout(() => {
                document.querySelectorAll('.photo').forEach(p => p.classList.add('show'));
                // 图片显示后 → 显示底部文字
                document.querySelectorAll('.nav-link').forEach(item => item.classList.add('show'));
            }, 100);

            initSmoothParallax();
        }

        function initSmoothParallax() {
            const photos = document.querySelectorAll('.photo');
            let mouseX = 0, mouseY = 0;
            let mx = 0, my = 0;

            window.addEventListener('mousemove', e => {
                mouseX = (e.clientX / window.innerWidth - 0.5);
                mouseY = (e.clientY / window.innerHeight - 0.5);
            });

            window.addEventListener('touchmove', e => {
                if (e.touches.length > 0) {
                    mouseX = (e.touches[0].clientX / window.innerWidth - 0.5);
                    mouseY = (e.touches[0].clientY / window.innerHeight - 0.5);
                }
            });

            function animate() {
                mx += (mouseX - mx) * 0.1;
                my += (mouseY - my) * 0.1;

                photos.forEach((img, i) => {
                    const speed = 5 + i * 0.9;
                    const moveX = mx * speed;
                    const moveY = my * speed;
                    const rot = parseFloat(img.style.transform.match(/rotate\((.*?)deg\)/)[1] || 0);
                    
                    img.style.transform = `translate(-50%, -50%) rotate(${rot}deg) translate(${moveX}px, ${moveY}px)`;
                });
                requestAnimationFrame(animate);
            }
            animate();
        }
    </script>
</body>
</html>
